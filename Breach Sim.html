<script type="text/javascript" data-cmp-ab="1" src="https://cdn.consentmanager.net/delivery/autoblocking/4d5883180219f.js" data-cmp-host="a.delivery.consentmanager.net" data-cmp-cdn="cdn.consentmanager.net" data-cmp-codesrc="16"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cybersecurity Terminal Adventure</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Standardized Nav CSS from detective.html for visual consistency */
    :root{
        --bg:#1a1a2e;
        --panel:#0f0f1b;
        --accent:#00ff00;
        --muted:#ccc;
        --gold:#ffaa00;
    }
    html,body{height:100%; margin:0; background:var(--bg); color:#e0e0e0; font-family: "Courier New", Courier, monospace;}

    /* === TOP TABS NAV === */
    .top-nav {
        display:flex;
        gap:8px;
        align-items:center;
        padding:10px 16px;
        background: linear-gradient(180deg, rgba(0,0,0,0.12), transparent);
        border-bottom:1px solid rgba(255,255,255,0.02);
        position: sticky;
        top: 0;
        z-index: 50;
    }
    .tabs {
        display:flex;
        gap:6px;
        align-items:center;
    }
    .tab {
        display:inline-block;
        padding:8px 14px;
        border-radius:8px;
        color: #e9ffe9;
        text-decoration:none;
        background: transparent;
        border: 1px solid rgba(0,255,0,0.06);
        transition: background 160ms, transform 120ms;
        font-weight:600;
        font-size:0.95rem;
    }
    .tab:hover{ transform: translateY(-2px); background: rgba(0,255,0,0.04); }
    .tab.active{
        background: var(--accent);
        color: #1a1a2e;
        box-shadow: 0 6px 18px rgba(0,255,65,0.12);
    }
    .brand {
        margin-left: auto;
        font-size:0.95rem;
        color: var(--muted);
    }
    /* New styles for aligning the link box and logo */
    .footer-content-wrapper {
        display: flex;
        justify-content: space-between; /* Space out the link box and logo */
        align-items: center; /* Vertically align them */
        max-width: 900px;
        margin: 20px auto;
        padding: 0 20px;
    }
    .uclan-link-box {
        /* This box's height dictates the overall height for alignment */
        padding: 10px;
        border: 1px solid var(--accent);
        border-radius: 8px;
        line-height: 1.5; /* Ensure content spacing */
    }
    .logo-footer {
        /* Set logo container to match the height of its sibling, the uclan-link-container */
        height: 100%; /* Important: Match height of flex item */
        display: flex; /* Use flex to center the image if needed */
        align-items: center;
        margin-left: 20px;
    }
    .logo-footer img {
        /* Make the image height match the parent logo-footer container's height */
        height: 100%; 
        width: auto; /* Maintain aspect ratio */
        max-height: 50px; /* Optional: Set a reasonable max height */
    }

  </style>
</head>
<body>



  <div class="terminal">
    <h1 class="terminal-header">University of Lancashire</h1>
    <h1 class="terminal-header">Cyber Security Simulator</h1>
    <div id="explanation" class="explanation"></div>
    <div id="scene-text" class="terminal-text"></div>
    <div id="options" class="terminal-options"></div>
    <div id="score-box"></div>
    </div>
    
    <div class="footer-content-wrapper">
        <div id="uclan-link-container" style="display: block;">
            <div class="uclan-link-box">
                Interested in more Cyber Security skills? <a href="https://www.lancashire.ac.uk/undergraduate/courses/cyber-security-bsc-hons" target="_blank">www.lancashire.ac.uk/cybersecurity</a>
            </div>
        </div>

        <div class="logo-footer" style="text-align:center; opacity:0.8;">
            <img src="university_of_lancashire_logo.png" alt="University of Lancashire Logo" style="filter: invert(80%) hue-rotate(180deg) brightness(1.2);">
        </div>
        </div>


  <script src="script.js"></script>
</body>
</html>
